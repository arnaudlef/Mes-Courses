<div class="container vh-100">
    <div class="row h-100 d-flex justify-content-center align-items-center px-md-0 px-4">
        <div class="col-6 text-center p-5 auth-container secondary-background">
            <div class="logo-container">
                <img src="/logo.png" alt="logo" class="logo-img">
            </div>
            <h1 class="mt-3">Mes Courses</h1>
            <p class="my-2 px-md-3 px-0">Entre tes informations pour te connecter et avoir accès à tes listes de courses</p>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="my-4">
                <div class="input-group mb-3">
                    <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Email" aria-label="Email">
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Mot de passe" aria-label="Mot de passe">
                </div>
                <div class="col-12">
                    <button class="w-100 btn py-2" type="submit">Connexion</button>
                </div>
            </form>
            <div class="forgot-link">
                <span>Mot de passe oublié ?</span>
            </div>
            <div class="register">
                <a class="register-link" routerLink="/auth/register">Pas encore de compte ? Inscrivez-vous ici</a>
            </div>
        </div>
    </div>
</div>

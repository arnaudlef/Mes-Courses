<div class="container vh-100">
    <div class="row h-100 d-flex justify-content-center align-items-center px-md-0 px-4">
        <div class="col-6 text-center p-md-5 px-5 py-4 auth-container secondary-background">
            <div class="logo-container">
                <img src="/logo.png" alt="logo" class="logo-img">
            </div>
            <h1 class="mt-3">Mes Courses</h1>
            <p class="my-2 px-md-3 px-0">Entre tes informations pour t'inscrire et avoir accès à tes listes de courses</p>
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="my-3">
                <div class="row">
                    <div class="mb-3 col-6">
                        <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Prénom" aria-label="Prénom">
                    </div>
                    <div class="mb-3 col-6">
                        <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Nom" aria-label="Nom">
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Email" aria-label="Email">
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Mot de passe" aria-label="Mot de passe">
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control py-2 primary-background primary-color" placeholder="Confirmer le mot de passe" aria-label="Confirmer le mot de passe">
                </div>
                <div class="col-12">
                    <button class="w-100 btn py-2" type="submit">S'incrire</button>
                </div>
            </form>
            <div class="register">
                <a class="register-link" routerLink="/auth/register">Déjà membre ? Connectez-vous ici</a>
            </div>
        </div>
    </div>
</div>
